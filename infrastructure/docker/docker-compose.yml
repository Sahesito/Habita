version: '3.9'

name: habita-infra

services:

  # PostgreSQL
  postgres:
    image: postgres:17-alpine
    container_name: habita-postgres
    environment:
      POSTGRES_USER: habita
      POSTGRES_PASSWORD: habita_dev_2024
      POSTGRES_DB: habita_main
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habita"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:8-alpine
    container_name: habita-redis
    command: redis-server --requirepass habita_redis_2024
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "habita_redis_2024", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: habita-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: habita
      RABBITMQ_DEFAULT_PASS: habita_rabbit_2024
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: habita-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/habita_keycloak
      KC_DB_USERNAME: habita
      KC_DB_PASSWORD: habita_dev_2024
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_HTTP_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # MinIO
  minio:
    image: minio/minio:latest
    container_name: habita-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: habita_minio
      MINIO_ROOT_PASSWORD: habita_minio_2024
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # Mailhog (emails en local)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: habita-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data: