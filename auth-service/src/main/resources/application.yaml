spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5433/habita_auth
    username: habita
    password: "habita_dev_2024"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
