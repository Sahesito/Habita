spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5433/habita_users
    username: habita
    password: "habita_dev_2024"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8082
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

habita:
  auth-service:
    url: http://localhost:8081/api/v1

logging:
  level:
    root: INFO
    sahe.com.userservice: DEBUG